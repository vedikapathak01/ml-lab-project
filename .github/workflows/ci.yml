      - name: ML CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install azure-ai-ml mlflow scikit-learn

      - name: Run training
        run: python src/train.py

      # 🔥 AZURE PART (CLEAN)
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure ML Workspace
        run: |
          az extension add -n ml -y
          az configure --defaults \
            group=<YOUR_RESOURCE_GROUP> \
            workspace=<YOUR_WORKSPACE_NAME>

      - name: Submit Azure ML Job
        run: az ml job create --file job.yml